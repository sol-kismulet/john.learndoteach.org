<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>songs</title>
  <style>
    body {
      margin: 0;
      padding: 2rem 1.5rem 4rem;
      font-family: "Cormorant Garamond", serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    main {
      width: min(26rem, 100%);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 2rem;
      text-transform: lowercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.75rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      padding: 0.4rem 0.5rem 0.4rem 0;
      display: block;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    a:hover,
    a:focus {
      color: #d8d8ff;
      border-color: rgba(216, 216, 255, 0.4);
    }

    .section-break {
      margin-top: 1.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <main>
    <h1>songs</h1>
    <ul id="song-list"></ul>
  </main>

  <script>
    fetch('songs.json')
      .then(r => r.json())
      .then(data => {
        const list = document.getElementById('song-list');
        const songs = data.songs || {};

        // Song entries from songs.json, sorted alphabetically by title
        const entries = Object.entries(songs).sort((a, b) =>
          a[1].title.localeCompare(b[1].title)
        );

        entries.forEach(([slug, song]) => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = 'song.html?s=' + encodeURIComponent(slug);
          a.textContent = song.title;
          li.appendChild(a);
          list.appendChild(li);
        });

        // Special pages
        const extras = [
          { href: 'youtube.html', title: 'youtube looper' },
          { href: 'john.html', title: 'john' },
        ];

        extras.forEach((item, i) => {
          const li = document.createElement('li');
          if (i === 0) li.className = 'section-break';
          const a = document.createElement('a');
          a.href = item.href;
          a.textContent = item.title;
          li.appendChild(a);
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
