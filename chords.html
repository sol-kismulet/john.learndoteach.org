<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chords</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Cormorant Garamond", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2.5rem 1rem 4rem;
      box-sizing: border-box;
    }
    a { color: #9cd8ff; }
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover { color: #d8d8ff; }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }
    .hint {
      margin: -0.5rem 0 0;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
      text-align: center;
    }

    /* --- circle of fifths (root picker) --- */
    #circle {
      width: min(360px, 92vw);
      height: auto;
    }
    .node circle {
      fill: #161616;
      stroke: #555;
      stroke-width: 1.5;
      transition: fill 0.15s, stroke 0.15s;
    }
    .node text {
      fill: #cfcfcf;
      font-size: 18px;
      font-weight: 500;
      pointer-events: none;
    }
    .node { cursor: pointer; }
    .node:hover circle { stroke: #9cd8ff; }
    .node:focus { outline: none; }
    .node:focus-visible circle { stroke: #9cd8ff; stroke-width: 2.5; }
    .node .alt { font-size: 12px; fill: rgba(255, 255, 255, 0.55); }
    .node.selected circle { fill: #9cd8ff; stroke: #9cd8ff; }
    .node.selected text { fill: #06121c; }

    /* --- mini keyboard (chord visualization) --- */
    .mini-kbd {
      display: flex;
      align-items: flex-start;
      height: 70px;
      margin: 0 auto;
    }
    .mini-key { position: relative; box-sizing: border-box; }
    .mini-key.white {
      flex: 0 0 18px;
      height: 100%;
      background: linear-gradient(#fafafa, #e6e6e6);
      border: 1px solid #2a2a2a;
      border-radius: 0 0 3px 3px;
    }
    .mini-key.black {
      position: absolute;
      top: 0;
      right: -32%;
      width: 64%;
      height: 62%;
      background: linear-gradient(#2a2a2a, #000);
      border: 1px solid #000;
      border-radius: 0 0 3px 3px;
      z-index: 2;
    }
    .mini-key.white.on { background: linear-gradient(#bfe6ff, #9cd8ff); }
    .mini-key.black.on { background: linear-gradient(#6fb4d6, #2f6f8f); }
    @media (max-width: 600px) {
      .mini-kbd { height: 56px; }
      .mini-key.white { flex: 0 0 14px; }
    }

    /* --- controls --- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.7rem 1.4rem;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .ctl { display: inline-flex; align-items: center; gap: 0.5em; }
    .ctl select {
      background: #000;
      border: 1px solid #666;
      color: #ddd;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.2em 0.35em;
    }
    .ctl select:hover { border-color: #9cd8ff; }

    /* --- toggle switch (matches scales/keyboard pages) --- */
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      cursor: pointer;
      user-select: none;
    }
    .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
    .switch .track {
      width: 2.4em;
      height: 1.2em;
      border: 1px solid #666;
      border-radius: 1em;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .switch .thumb {
      position: absolute;
      top: 50%;
      left: 0.15em;
      width: 0.9em;
      height: 0.9em;
      transform: translateY(-50%);
      background: #ddd;
      border-radius: 50%;
      transition: left 0.15s, background 0.15s;
    }
    .switch input:checked + .track { background: #2f6f8f; border-color: #9cd8ff; }
    .switch input:checked + .track .thumb { left: calc(100% - 1.05em); background: #9cd8ff; }

    /* --- focus panel ("now showing") --- */
    .focus {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
    }
    .chord-name {
      font-size: 2.6rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #9cd8ff;
      min-height: 1.1em;
    }
    .chord-quality {
      margin-top: -0.5rem;
      font-size: 1.05rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.55);
    }
    .chord-notes {
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      color: #eee;
      min-height: 1.2em;
    }

    .play-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.4rem;
    }
    button {
      background: none;
      border: 1px solid #666;
      color: #ddd;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.4em 0.9em;
      cursor: pointer;
    }
    button:hover { border-color: #9cd8ff; color: #fff; }
    button.playing { border-color: #9cd8ff; color: #9cd8ff; background: rgba(156, 216, 255, 0.12); }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <h1>chords</h1>
  <p class="hint">pick a root on the circle of fifths, choose a chord quality, then hear and read it</p>

  <svg id="circle" viewBox="0 0 360 360" aria-label="circle of fifths root picker"></svg>

  <div class="mini-kbd" id="mini-kbd" aria-label="chord on the keyboard"></div>

  <div class="controls">
    <label class="ctl">
      chord
      <select id="quality"></select>
    </label>
    <label class="ctl">
      tone
      <select id="tone">
        <option value="piano" selected>piano</option>
        <option value="cello">cello</option>
      </select>
    </label>
  </div>

  <div class="focus">
    <div class="chord-name" id="chord-name">&nbsp;</div>
    <div class="chord-quality" id="chord-quality">&nbsp;</div>
    <div class="chord-notes" id="chord-notes">&nbsp;</div>
    <div class="play-controls">
      <label class="switch">
        <input id="invert" type="checkbox">
        <span class="track"><span class="thumb"></span></span>
        first inversion
      </label>
      <button id="play-block" type="button">play chord</button>
      <button id="play-arp" type="button">arpeggiate</button>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="chords.js"></script>
</body>
</html>
