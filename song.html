<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    #video-wrapper {
      width: min(560px, 90vw);
      aspect-ratio: 16 / 9;
      background: #111;
    }
    #video-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .loop-label {
      width: 100%;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
      font-style: italic;
      margin: 0.6rem 0 0.2rem;
      text-align: left;
    }
    #audio-wrapper {
      display: none;
    }
    #audio-wrapper.active {
      display: block;
    }
    #score-wrapper {
      width: min(560px, 90vw);
      display: none;
      padding: 0.75rem 0.5rem;
      background: #fafafa;
      border-radius: 4px;
    }
    #score-wrapper.active {
      display: block;
    }
    #score-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span id="song-title">loading…</span>
    <img src="feather.svg" alt="" class="feather">
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <div id="audio-wrapper">
    <audio id="audio" preload="auto"></audio>
  </div>

  <div id="score-wrapper">
    <img id="score-img" alt="">
  </div>

  <div class="controls">
    <div id="loops"></div>
    <div>
      <button id="add-loop">+</button>
    </div>
    <div>
      <label class="speed-label">speed <span id="speed-display">1.00x</span></label>
      <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1">
    </div>
    <div>
      <button id="play-btn">play piece</button>
    </div>
    <div id="scale-tools" style="display: none; gap: 0.5rem; flex-wrap: wrap; justify-content: center;"></div>
  </div>

  <div id="footer-area"></div>

  <div id="drone-panel">
    <span class="drone-tag">drone</span>
    <button id="drone-btn" type="button">A♭</button>
    <label class="drone-fifth">
      <input id="drone-fifth" type="checkbox">
      <span class="track"><span class="thumb"></span></span>
      add 5th
    </label>
    <label class="drone-vol">
      vol
      <input id="drone-volume" type="range" min="0" max="0.4" step="0.01" value="0.1">
    </label>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="audio.js"></script>
  <script src="song.js"></script>
</body>
</html>
