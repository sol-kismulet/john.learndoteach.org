<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>brahms — var. iv test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    #video-wrapper {
      width: min(560px, 90vw);
      aspect-ratio: 16 / 9;
      background: #111;
    }
    #video-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .loop-label {
      width: 100%;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
      font-style: italic;
      margin: 0.6rem 0 0.2rem;
      text-align: left;
    }
    .sync-controls {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-top: 0.5rem;
      text-align: center;
    }
    .audio-source-toggle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .audio-source-toggle button {
      font-size: 0.85rem;
      padding: 0.3em 0.7em;
    }
    .audio-source-toggle .active {
      color: #fff;
      border-color: #fff;
    }
    #sync-status {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }
    #debug-log {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
      font-family: monospace;
      max-height: 10em;
      overflow-y: auto;
      text-align: left;
      white-space: pre;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span>brahms — var. iv test</span>
    <img src="feather.svg" alt="" class="feather">
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <div class="controls">
    <div class="audio-source-toggle">
      <span>audio:</span>
      <button id="btn-youtube" class="active">youtube</button>
      <button id="btn-local">local file</button>
    </div>

    <div id="loops"></div>
    <div>
      <button id="add-loop">+</button>
    </div>
    <div>
      <label class="speed-label">speed <span id="speed-display">1.00x</span></label>
      <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1">
    </div>
    <div>
      <button id="play-btn">play piece</button>
    </div>

    <div class="sync-controls">
      <div id="sync-status"></div>
      <div id="debug-log"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ══════════════════════════════════════════════════════════════
    // SYNC ARCHITECTURE v2 — PLL (Phase-Locked Loop)
    //
    // YouTube is the sole clock source. We never track grain position
    // via wall-clock math. Instead, every rAF tick we read YouTube's
    // currentTime and compare it to the grain player's expected
    // position (also derived from YouTube). Drift is corrected by
    // micro-nudging the grain playback rate by ±0.001 — below the
    // threshold of human perception but enough to keep clocks tethered.
    //
    // Hard re-syncs (stop + restart grain) only happen on:
    //   - state changes (PLAYING, PAUSED, BUFFERING, ENDED)
    //   - loop boundaries (seek back to start)
    //   - user-initiated seeks or speed changes
    //   - drift exceeding 150ms (emergency correction)
    // ══════════════════════════════════════════════════════════════

    // ── Config ──
    const VIDEO_ID = 'QmQLb5SZb4E';
    const AUDIO_URL = 'brahms.mp3';
    const LOOPS = [
      { start: '6:17', end: '8:44', label: 'Var. IV, andante con moto, mm. 146–205' }
    ];

    // PLL tuning constants
    const PLL_GAIN        = 0.05;   // proportional gain: nudge = drift * PLL_GAIN
    const PLL_MAX_NUDGE   = 0.01;   // max rate adjustment (still imperceptible)
    const PLL_DEADZONE    = 0.015;  // 15ms — below this, no correction needed
    const PLL_HARD_RESYNC = 0.150;  // 150ms — above this, stop/restart grain
    const DEBOUNCE_MS     = 200;    // wait after PLAYING before syncing
    const LATENCY_OFFSET  = 0;      // tune by ear: negative = grain starts earlier
    const RATE_EPSILON    = 0.0005; // skip playbackRate write if change < this

    // ── State ──
    let ytPlayer;
    let ytReady = false;
    let loopActive = false;
    let playActive = false;
    let currentLoopIndex = null;
    let loops = [];
    let useLocalAudio = false;

    // ── Tone.js GrainPlayer ──
    let grainPlayer = null;
    let grainReady = false;
    let toneStarted = false;
    let targetRate = 1;           // the user-set playback rate
    let grainIsPlaying = false;

    // ── Sync state ──
    let syncRAF = null;           // requestAnimationFrame handle
    let lastGrainStartTime = 0;   // audio-file position where grain was last started
    let lastGrainStartWall = 0;   // Tone.now() when grain was last started
    let currentAppliedRate = 1;   // actual rate on the grain player (includes nudges)
    let playingDebounceUntil = 0; // timestamp: ignore sync until this time
    let lastYtTime = 0;          // for detecting YouTube native loop wrap-around
    let pendingSeekTarget = null; // position we asked YouTube to seek to

    // ── Elements ──
    const loopsContainer = document.getElementById('loops');
    const addLoopBtn = document.getElementById('add-loop');
    const playBtn = document.getElementById('play-btn');
    const speedInput = document.getElementById('speed');
    const speedDisplay = document.getElementById('speed-display');
    const syncStatus = document.getElementById('sync-status');
    const btnYoutube = document.getElementById('btn-youtube');
    const btnLocal = document.getElementById('btn-local');
    const debugLog = document.getElementById('debug-log');

    // ── Diagnostic logging (visible on page) ──
    function dbg(msg) {
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      const line = time + ' ' + msg;
      debugLog.textContent = line + '\n' + debugLog.textContent;
      // Keep last 30 lines
      const lines = debugLog.textContent.split('\n');
      if (lines.length > 30) debugLog.textContent = lines.slice(0, 30).join('\n');
    }

    // ── Initialize Tone.js GrainPlayer ──
    async function initGrainPlayer() {
      try {
        syncStatus.textContent = 'loading audio buffer…';
        grainPlayer = new Tone.GrainPlayer({
          url: AUDIO_URL,
          grainSize: 0.5,
          overlap: 0.3,
          loop: false,
          onload: () => {
            grainReady = true;
            const sysRate = Tone.context.rawContext.sampleRate;
            const dur = grainPlayer.buffer.duration;
            syncStatus.textContent = 'audio loaded — ready (system: ' + sysRate + 'Hz)';
            dbg('MP3 LOADED: duration=' + dur.toFixed(1) + 's, sysRate=' + sysRate);
            // If YouTube is already playing with local audio selected,
            // we missed the PLAYING event — start the grain now
            if (useLocalAudio && ytReady &&
                ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
              dbg('MP3 late load: YT already playing, starting grain');
              grainHardSync(ytPlayer.getCurrentTime() + LATENCY_OFFSET);
              startSyncLoop();
            }
          }
        }).toDestination();
      } catch (e) {
        syncStatus.textContent = 'failed to load audio: ' + e.message;
      }
    }

    async function ensureToneStarted() {
      if (!toneStarted) {
        await Tone.start();
        toneStarted = true;
      }
    }

    // ── Grain position estimate ──
    // Estimate where the grain player is based on when we started it.
    // This is ONLY used for drift measurement — YouTube is still the
    // source of truth. The estimate accumulates the actual applied rate
    // (including PLL nudges) so it's much more accurate than the old
    // wall-clock tracker that ignored nudges.
    function estimateGrainPosition() {
      if (!grainIsPlaying) return lastGrainStartTime;
      const elapsed = (Tone.now() - lastGrainStartWall) * currentAppliedRate;
      return lastGrainStartTime + elapsed;
    }

    // ── Hard sync: stop and restart grain at a specific position ──
    function grainHardSync(audioTime) {
      if (!grainReady || !grainPlayer) {
        dbg('hardSync SKIP: grainReady=' + grainReady + ' grainPlayer=' + !!grainPlayer);
        return;
      }
      if (!grainPlayer.buffer.loaded) {
        dbg('hardSync SKIP: buffer not loaded');
        return;
      }
      // Clamp to valid buffer range — seeking past the end causes silence
      const bufDuration = grainPlayer.buffer.duration;
      const t = Math.max(0, Math.min(audioTime, bufDuration - 0.1));
      // Only stop if actually playing — calling stop() on a never-started
      // GrainPlayer corrupts its internal scheduling state, causing the
      // subsequent start() to silently fail (the "cold start" bug)
      if (grainIsPlaying) {
        grainPlayer.stop();
      }
      // Small look-ahead so AudioContext clears previous grains before
      // starting new ones — prevents artifacts at the splice point
      const startTime = Tone.now() + 0.05;
      lastGrainStartTime = t;
      lastGrainStartWall = startTime;
      currentAppliedRate = targetRate;
      grainPlayer.playbackRate = targetRate;
      grainPlayer.start(startTime, t);
      grainIsPlaying = true;
      const m = Math.floor(t / 60);
      const s = (t % 60).toFixed(1);
      dbg('hardSync → ' + m + ':' + s + ' (requested ' + audioTime.toFixed(1) + ', buf=' + bufDuration.toFixed(1) + 's, rate=' + targetRate + ')');
    }

    // ── Stop grain ──
    function grainStop() {
      if (!grainPlayer) return;
      lastGrainStartTime = estimateGrainPosition();
      // Only stop if actually playing — see cold-start bug note above
      if (grainIsPlaying) {
        grainPlayer.stop();
      }
      grainIsPlaying = false;
    }

    // Start loading immediately
    initGrainPlayer();

    // ── Audio source toggle ──
    btnYoutube.addEventListener('click', async () => {
      useLocalAudio = false;
      btnYoutube.classList.add('active');
      btnLocal.classList.remove('active');
      if (ytReady) ytPlayer.unMute();
      grainStop();
      stopSyncLoop();
      syncStatus.textContent = 'using youtube audio';
    });

    btnLocal.addEventListener('click', async () => {
      dbg('CLICK: local file — grainReady=' + grainReady);
      await ensureToneStarted();
      useLocalAudio = true;
      btnLocal.classList.add('active');
      btnYoutube.classList.remove('active');
      if (ytReady) ytPlayer.mute();
      // If video is already playing, start grain now
      if (ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING && grainReady) {
        dbg('local: YT already playing, starting grain');
        grainHardSync(ytPlayer.getCurrentTime() + LATENCY_OFFSET);
        startSyncLoop();
      }
      syncStatus.textContent = 'using local audio (tone.js grain)';
    });

    // ── Helpers ──
    function parseTime(t) {
      const parts = t.split(':');
      if (parts.length === 1) return parseFloat(parts[0]) || 0;
      if (parts.length === 3) return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
      return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // ══════════════════════════════════════════════════════════════
    // SYNC LOOP — requestAnimationFrame-based PLL
    // ══════════════════════════════════════════════════════════════

    function startSyncLoop() {
      if (syncRAF !== null) return; // already running
      function tick() {
        syncRAF = requestAnimationFrame(tick);
        try {
          if (!ytReady || !useLocalAudio) return;

          const videoTime = ytPlayer.getCurrentTime();

          // ── YouTube native loop wrap-around detection ──
          // If ytTime jumps backward by >1s without us seeking, YouTube
          // looped via its native context menu — force a hard re-sync
          if (videoTime < lastYtTime - 1.0 && grainIsPlaying) {
            grainHardSync(videoTime + LATENCY_OFFSET);
          }
          lastYtTime = videoTime;

          // ── Loop boundary check ──
          if (loopActive && currentLoopIndex !== null) {
            const start = parseTime(loops[currentLoopIndex].start.value);
            const end = parseTime(loops[currentLoopIndex].end.value);
            const overshoot = videoTime - end;
            if (end > start && overshoot > 0) {
              if (overshoot < 5.0) {
                // Natural playback past the loop end — wrap back
                grainStop();
                ytPlayer.seekTo(start, true);
                grainHardSync(start + LATENCY_OFFSET);
                pendingSeekTarget = null;
              } else {
                // More than 5s past loop end — this is a manual seek or
                // YouTube resumed from a distant position. Kill the loop
                // rather than snapping the user back to a stale boundary.
                // Don't call stopLoop() — that would pause playback. Just
                // disable the loop flag and reset the button text.
                if (currentLoopIndex !== null) {
                  loops[currentLoopIndex].button.textContent = 'loop section';
                }
                loopActive = false;
                currentLoopIndex = null;
              }
              return;
            }
          }

          // ── Debounce: skip sync briefly after state transitions ──
          if (performance.now() < playingDebounceUntil) return;

          // ── PLL drift correction ──
          if (grainIsPlaying) {
            const grainTime = estimateGrainPosition();
            const expectedTime = videoTime + LATENCY_OFFSET;
            const drift = grainTime - expectedTime; // positive = grain is ahead
            const absDrift = Math.abs(drift);

            if (absDrift > PLL_HARD_RESYNC) {
              // Emergency: drift too large, hard re-sync
              grainHardSync(expectedTime);
              syncStatus.textContent = 'hard resync (drift: ' + (drift * 1000).toFixed(0) + 'ms)';
            } else if (absDrift > PLL_DEADZONE) {
              // Proportional nudge: scale correction to drift magnitude
              // At 100ms drift: nudge = 0.005 → corrects at 5ms/sec
              // At 50ms drift:  nudge = 0.0025 → corrects at 2.5ms/sec
              // Capped at ±0.01 to stay imperceptible
              const nudge = Math.max(-PLL_MAX_NUDGE, Math.min(PLL_MAX_NUDGE, -drift * PLL_GAIN));
              const newRate = targetRate + nudge;
              // Epsilon-gate: skip write if rate barely changed — avoids
              // grain rescheduling churn from YouTube's stair-step clock
              if (Math.abs(newRate - currentAppliedRate) > RATE_EPSILON) {
                currentAppliedRate = newRate;
                grainPlayer.playbackRate = newRate;
              }
            } else {
              // Within deadzone — restore exact target rate
              if (currentAppliedRate !== targetRate) {
                currentAppliedRate = targetRate;
                grainPlayer.playbackRate = targetRate;
              }
            }
          }
        } catch (e) {}
      }
      syncRAF = requestAnimationFrame(tick);
    }

    function stopSyncLoop() {
      if (syncRAF !== null) {
        cancelAnimationFrame(syncRAF);
        syncRAF = null;
      }
    }

    // ══════════════════════════════════════════════════════════════
    // COORDINATED PLAYBACK
    // ══════════════════════════════════════════════════════════════

    function seekBoth(videoTimeSec) {
      const ytState = ytPlayer.getPlayerState();
      dbg('seekBoth(' + videoTimeSec.toFixed(1) + ') ytState=' + ytState);
      pendingSeekTarget = videoTimeSec;
      if (useLocalAudio) {
        grainStop();
      }
      ytPlayer.seekTo(videoTimeSec, true);
      // If YouTube is already PLAYING, seekTo may not trigger a state
      // change — the player just jumps the playhead silently. In that
      // case onStateChange never fires and the grain player would be
      // left stopped (or running from the old position). Sync now.
      if (useLocalAudio && grainReady && ytState === YT.PlayerState.PLAYING) {
        dbg('seekBoth: YT already PLAYING, syncing grain immediately');
        grainHardSync(videoTimeSec + LATENCY_OFFSET);
      }
    }

    function playBoth() {
      ytPlayer.playVideo();
    }

    function pauseBoth() {
      ytPlayer.pauseVideo();
      if (useLocalAudio) grainStop();
    }

    function setSpeed(rate) {
      targetRate = rate;
      ytPlayer.setPlaybackRate(rate);
      if (useLocalAudio && grainIsPlaying) {
        // Hard sync on speed change to avoid accumulated error
        grainHardSync(ytPlayer.getCurrentTime() + LATENCY_OFFSET);
      }
    }

    // ── Loop elements ──
    function createLoopElement(startVal, endVal, label) {
      if (label) {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'loop-label';
        labelDiv.textContent = label;
        loopsContainer.appendChild(labelDiv);
      }

      const div = document.createElement('div');
      div.className = 'loop';

      const startLabel = document.createElement('label');
      startLabel.textContent = 'start ';
      const startInput = document.createElement('input');
      startInput.type = 'text';
      startInput.className = 'start';
      startInput.value = startVal;
      startLabel.appendChild(startInput);

      const endLabel = document.createElement('label');
      endLabel.textContent = 'end ';
      const endInput = document.createElement('input');
      endInput.type = 'text';
      endInput.className = 'end';
      endInput.value = endVal;
      endLabel.appendChild(endInput);

      const btn = document.createElement('button');
      btn.textContent = 'loop section';
      btn.className = 'loop-btn';
      const index = loops.length;
      btn.addEventListener('click', () => handleLoopButton(index));

      div.appendChild(startLabel);
      div.appendChild(endLabel);
      div.appendChild(btn);
      loopsContainer.appendChild(div);

      loops.push({ start: startInput, end: endInput, button: btn });
    }

    // ── Loop logic ──
    function stopLoop() {
      if (currentLoopIndex !== null) {
        loops[currentLoopIndex].button.textContent = 'loop section';
      }
      if (ytReady && loopActive) {
        pauseBoth();
      }
      loopActive = false;
      currentLoopIndex = null;
    }

    async function startLoop(i) {
      if (!ytReady) return;
      dbg('startLoop(' + i + ') grainReady=' + grainReady + ' toneStarted=' + toneStarted);
      await ensureToneStarted();
      dbg('startLoop: Tone started, ctx=' + Tone.context.state);
      playActive = false;
      playBtn.textContent = 'play piece';
      currentLoopIndex = i;
      const start = parseTime(loops[i].start.value);
      seekBoth(start);
      playBoth();
      loops[i].button.textContent = 'stop';
      loopActive = true;
    }

    function handleLoopButton(i) {
      if (loopActive && currentLoopIndex === i) {
        stopLoop();
      } else {
        stopLoop();
        startLoop(i);
      }
    }

    // ── "+" button ──
    addLoopBtn.addEventListener('click', () => {
      if (loops.length === 0) return;
      const last = loops[loops.length - 1];
      const startVal = last.end.value;
      const startSec = parseTime(startVal);
      createLoopElement(startVal, formatTime(startSec + 10));
    });

    // ── Play piece ──
    playBtn.addEventListener('click', async () => {
      if (!ytReady) return;
      await ensureToneStarted();
      if (!playActive) {
        stopLoop();
        seekBoth(0);
        playBoth();
        playBtn.textContent = 'stop';
        playActive = true;
      } else {
        pauseBoth();
        playBtn.textContent = 'play piece';
        playActive = false;
      }
    });

    // ── Speed ──
    speedInput.addEventListener('input', () => {
      if (!ytReady) return;
      const r = parseFloat(speedInput.value);
      setSpeed(r);
      speedDisplay.textContent = r.toFixed(2) + 'x';
    });

    // Reset speed on load — browser may restore old slider value
    // but YouTube doesn't restore its rate, causing mismatch
    (function resetSpeedOnLoad() {
      speedInput.value = 1;
      targetRate = 1;
      currentAppliedRate = 1;
      speedDisplay.textContent = '1.00x';
    })();

    // ── Build loops ──
    LOOPS.forEach(loop => {
      createLoopElement(loop.start, loop.end, loop.label);
    });

    // ══════════════════════════════════════════════════════════════
    // YOUTUBE PLAYER
    // ══════════════════════════════════════════════════════════════

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: VIDEO_ID,
        playerVars: {
          origin: window.location.origin,
          rel: 0
        },
        events: {
          onReady: () => {
            ytReady = true;
            if (useLocalAudio) ytPlayer.mute();
          },

          onStateChange: (event) => {
            const state = event.data;

            if (state === YT.PlayerState.PLAYING) {
              const ytTime = ytPlayer.getCurrentTime();
              dbg('YT STATE: PLAYING ytTime=' + ytTime.toFixed(1) + ' pending=' + pendingSeekTarget + ' local=' + useLocalAudio + ' ready=' + grainReady + ' ctx=' + Tone.context.state);

              // Debounce: YouTube often fires PLAYING before the seek
              // has fully settled. Wait 200ms before trusting currentTime.
              playingDebounceUntil = performance.now() + DEBOUNCE_MS;

              // Re-check AudioContext — clicking inside the YouTube iframe
              // (cross-origin) can cause the parent context to suspend
              if (Tone.context.state === 'suspended') {
                Tone.context.resume();
                dbg('AudioContext was suspended — resuming');
              }

              if (useLocalAudio && grainReady) {
                // Use our intended seek position if we have one — getCurrentTime()
                // may still report a stale value during the first few hundred ms
                // after a seek. The PLL will correct any small error once the
                // debounce clears and YouTube's clock settles.
                const syncTime = (pendingSeekTarget !== null)
                  ? pendingSeekTarget
                  : ytTime;
                pendingSeekTarget = null;
                grainHardSync(syncTime + LATENCY_OFFSET);
              } else {
                dbg('SKIP grain start: local=' + useLocalAudio + ' ready=' + grainReady);
                pendingSeekTarget = null;
              }
              startSyncLoop();

            } else if (state === YT.PlayerState.PAUSED) {
              dbg('YT STATE: PAUSED');
              if (useLocalAudio) grainStop();
              stopSyncLoop();

            } else if (state === YT.PlayerState.BUFFERING) {
              dbg('YT STATE: BUFFERING ytTime=' + ytPlayer.getCurrentTime().toFixed(1));
              // YouTube is rebuffering — stop grain to prevent it
              // from running ahead while video is stalled
              if (useLocalAudio) grainStop();

            } else if (state === YT.PlayerState.ENDED) {
              dbg('YT STATE: ENDED');
              playActive = false;
              playBtn.textContent = 'play piece';
              if (useLocalAudio) grainStop();
              stopSyncLoop();
            }
          },

          onPlaybackRateChange: (event) => {
            // YouTube clamped to a supported rate — sync our target
            const ytRate = event.data;
            targetRate = ytRate;
            currentAppliedRate = ytRate;
            speedDisplay.textContent = ytRate.toFixed(2) + 'x';
            // Update slider to match (YouTube may have clamped it)
            speedInput.value = ytRate;
            if (useLocalAudio && grainIsPlaying) {
              grainHardSync(ytPlayer.getCurrentTime() + LATENCY_OFFSET);
            }
          }
        }
      });
    };

    if (window.YT && window.YT.Player) {
      window.onYouTubeIframeAPIReady();
    }
  </script>
</body>
</html>
