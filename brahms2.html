<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>brahms — var. iv test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="song.css">
  <style>
    #video-wrapper {
      width: min(560px, 90vw);
      aspect-ratio: 16 / 9;
      background: #111;
    }
    #video-wrapper iframe {
      width: 100%;
      height: 100%;
    }
    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1rem;
      color: #666;
      text-decoration: none;
    }
    .back:hover {
      color: #d8d8ff;
    }
    .loop-label {
      width: 100%;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
      font-style: italic;
      margin: 0.6rem 0 0.2rem;
      text-align: left;
    }
    .sync-controls {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .sync-controls label {
      font-size: 0.85rem;
    }
    .sync-controls input[type="number"] {
      width: 5em;
      font-size: 0.85rem;
      text-align: center;
    }
    .audio-source-toggle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .audio-source-toggle button {
      font-size: 0.85rem;
      padding: 0.3em 0.7em;
    }
    .audio-source-toggle .active {
      color: #fff;
      border-color: #fff;
    }
    #sync-status {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← back</a>

  <div class="title">
    <span>brahms — var. iv test</span>
    <img src="feather.svg" alt="" class="feather">
  </div>

  <div id="video-wrapper">
    <div id="player"></div>
  </div>

  <div class="controls">
    <div class="audio-source-toggle">
      <span>audio:</span>
      <button id="btn-youtube" class="active">youtube</button>
      <button id="btn-local">local file</button>
    </div>

    <div id="loops"></div>
    <div>
      <button id="add-loop">+</button>
    </div>
    <div>
      <label class="speed-label">speed <span id="speed-display">1.00x</span></label>
      <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1">
    </div>
    <div>
      <button id="play-btn">play piece</button>
    </div>

    <div class="sync-controls">
      <div>
        <label>audio offset (sec): </label>
        <input type="number" id="audio-offset" value="-3.8" step="0.1">
      </div>
      <div id="sync-status"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ── Config ──
    const VIDEO_ID = 'QmQLb5SZb4E';
    const AUDIO_URL = 'brahms-var4.mp3';
    const LOOPS = [
      { start: '6:17', end: '8:44', label: 'Var. IV, andante con moto, mm. 146–205' }
    ];

    // ── State ──
    let player;
    let playerReady = false;
    let loopActive = false;
    let playActive = false;
    let currentLoopIndex = null;
    let loops = [];
    let useLocalAudio = false;

    // ── Tone.js GrainPlayer ──
    let grainPlayer = null;
    let grainReady = false;
    let toneStarted = false;
    let currentGrainOffset = 0;   // where in the audio file playback started
    let grainStartWallTime = 0;   // wall-clock time when playback started
    let currentPlaybackRate = 1;
    let grainIsPlaying = false;

    // ── Elements ──
    const loopsContainer = document.getElementById('loops');
    const addLoopBtn = document.getElementById('add-loop');
    const playBtn = document.getElementById('play-btn');
    const speedInput = document.getElementById('speed');
    const speedDisplay = document.getElementById('speed-display');
    const offsetInput = document.getElementById('audio-offset');
    const syncStatus = document.getElementById('sync-status');
    const btnYoutube = document.getElementById('btn-youtube');
    const btnLocal = document.getElementById('btn-local');

    // ── Initialize Tone.js GrainPlayer ──
    async function initGrainPlayer() {
      try {
        syncStatus.textContent = 'loading audio buffer…';
        grainPlayer = new Tone.GrainPlayer({
          url: AUDIO_URL,
          grainSize: 0.2,
          overlap: 0.1,
          loop: false,
          onload: () => {
            grainReady = true;
            syncStatus.textContent = 'audio loaded — ready';
          }
        }).toDestination();
      } catch (e) {
        syncStatus.textContent = 'failed to load audio: ' + e.message;
      }
    }

    async function ensureToneStarted() {
      if (!toneStarted) {
        await Tone.start();
        toneStarted = true;
      }
    }

    // Get current playback position in the audio file
    function getGrainCurrentTime() {
      if (!grainIsPlaying) return currentGrainOffset;
      const elapsed = (Tone.now() - grainStartWallTime) * currentPlaybackRate;
      return currentGrainOffset + elapsed;
    }

    // Start grain playback from a specific position in the audio file
    function grainPlay(fromTime) {
      if (!grainReady || !grainPlayer) return;
      if (fromTime < 0) fromTime = 0;
      grainPlayer.stop();
      const now = Tone.now();
      currentGrainOffset = fromTime;
      grainStartWallTime = now;
      grainPlayer.playbackRate = currentPlaybackRate;
      grainPlayer.start(now, fromTime);
      grainIsPlaying = true;
    }

    // Stop grain playback
    function grainStop() {
      if (!grainPlayer) return;
      currentGrainOffset = getGrainCurrentTime();
      grainPlayer.stop();
      grainIsPlaying = false;
    }

    // Seek grain to a position (without starting)
    function grainSeek(toTime) {
      if (grainIsPlaying) grainPlayer.stop();
      currentGrainOffset = Math.max(0, toTime);
      grainIsPlaying = false;
      // Don't restart — caller or onStateChange will handle that
    }

    // Set grain playback rate
    function grainSetRate(rate) {
      currentPlaybackRate = rate;
      if (grainIsPlaying && grainPlayer) {
        // Update offset to current position, then restart at new rate
        const currentPos = getGrainCurrentTime();
        grainPlayer.stop();
        const now = Tone.now();
        currentGrainOffset = currentPos;
        grainStartWallTime = now;
        grainPlayer.playbackRate = rate;
        grainPlayer.start(now, Math.max(0, currentPos));
      }
    }

    // Start loading immediately
    initGrainPlayer();

    // ── Audio source toggle ──
    btnYoutube.addEventListener('click', async () => {
      useLocalAudio = false;
      btnYoutube.classList.add('active');
      btnLocal.classList.remove('active');
      if (playerReady) player.unMute();
      grainStop();
      syncStatus.textContent = 'using youtube audio';
    });

    btnLocal.addEventListener('click', async () => {
      await ensureToneStarted();
      useLocalAudio = true;
      btnLocal.classList.add('active');
      btnYoutube.classList.remove('active');
      if (playerReady) player.mute();
      syncStatus.textContent = 'using local audio (tone.js grain)';
    });

    // ── Helpers ──
    function parseTime(t) {
      const parts = t.split(':');
      if (parts.length === 1) return parseFloat(parts[0]) || 0;
      if (parts.length === 3) return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseFloat(parts[2]);
      return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function getOffset() {
      return parseFloat(offsetInput.value) || 0;
    }

    // Seek both video and grain to a video-time position
    function seekBoth(videoTimeSec) {
      if (useLocalAudio) {
        grainStop();
        grainSeek(videoTimeSec + getOffset());
      }
      player.seekTo(videoTimeSec, true);
    }

    // Play video — grain audio will start via onStateChange PLAYING event
    function playBoth() {
      player.playVideo();
    }

    // Pause both
    function pauseBoth() {
      player.pauseVideo();
      if (useLocalAudio) {
        grainStop();
      }
    }

    // Set speed on both
    function setSpeed(rate) {
      player.setPlaybackRate(rate);
      if (useLocalAudio) {
        grainSetRate(rate);
      }
    }

    // ── Loop elements ──
    function createLoopElement(startVal, endVal, label) {
      if (label) {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'loop-label';
        labelDiv.textContent = label;
        loopsContainer.appendChild(labelDiv);
      }

      const div = document.createElement('div');
      div.className = 'loop';

      const startLabel = document.createElement('label');
      startLabel.textContent = 'start ';
      const startInput = document.createElement('input');
      startInput.type = 'text';
      startInput.className = 'start';
      startInput.value = startVal;
      startLabel.appendChild(startInput);

      const endLabel = document.createElement('label');
      endLabel.textContent = 'end ';
      const endInput = document.createElement('input');
      endInput.type = 'text';
      endInput.className = 'end';
      endInput.value = endVal;
      endLabel.appendChild(endInput);

      const btn = document.createElement('button');
      btn.textContent = 'loop section';
      btn.className = 'loop-btn';
      const index = loops.length;
      btn.addEventListener('click', () => handleLoopButton(index));

      div.appendChild(startLabel);
      div.appendChild(endLabel);
      div.appendChild(btn);
      loopsContainer.appendChild(div);

      loops.push({ start: startInput, end: endInput, button: btn });
    }

    // ── Loop logic ──
    function stopLoop() {
      if (currentLoopIndex !== null) {
        loops[currentLoopIndex].button.textContent = 'loop section';
      }
      if (playerReady && loopActive) {
        pauseBoth();
      }
      loopActive = false;
      currentLoopIndex = null;
    }

    async function startLoop(i) {
      if (!playerReady) return;
      await ensureToneStarted();
      playActive = false;
      playBtn.textContent = 'play piece';
      currentLoopIndex = i;
      const start = parseTime(loops[i].start.value);
      seekBoth(start);
      playBoth();
      loops[i].button.textContent = 'stop';
      loopActive = true;
    }

    function checkLoop() {
      if (!loopActive || currentLoopIndex === null) return;
      try {
        const start = parseTime(loops[currentLoopIndex].start.value);
        const end = parseTime(loops[currentLoopIndex].end.value);
        if (end <= start) return;
        const currentTime = player.getCurrentTime();
        if (currentTime >= end) {
          // Stop grain immediately to prevent blip, then seek both
          if (useLocalAudio) grainStop();
          seekBoth(start);
          // Video will trigger onStateChange PLAYING which restarts grain
          return;
        }

        // Periodic re-sync: nudge grain if it drifts more than 0.3s
        if (useLocalAudio && grainIsPlaying) {
          const expectedAudioTime = player.getCurrentTime() + getOffset();
          const drift = Math.abs(getGrainCurrentTime() - expectedAudioTime);
          if (drift > 0.3) {
            grainStop();
            grainPlay(expectedAudioTime);
          }
        }
      } catch (e) {}
    }

    function handleLoopButton(i) {
      if (loopActive && currentLoopIndex === i) {
        stopLoop();
      } else {
        stopLoop();
        startLoop(i);
      }
    }

    // ── "+" button ──
    addLoopBtn.addEventListener('click', () => {
      if (loops.length === 0) return;
      const last = loops[loops.length - 1];
      const startVal = last.end.value;
      const startSec = parseTime(startVal);
      createLoopElement(startVal, formatTime(startSec + 10));
    });

    // ── Play piece ──
    playBtn.addEventListener('click', async () => {
      if (!playerReady) return;
      await ensureToneStarted();
      if (!playActive) {
        stopLoop();
        seekBoth(0);
        playBoth();
        playBtn.textContent = 'stop';
        playActive = true;
      } else {
        pauseBoth();
        playBtn.textContent = 'play piece';
        playActive = false;
      }
    });

    // ── Speed ──
    speedInput.addEventListener('input', () => {
      if (!playerReady) return;
      const r = parseFloat(speedInput.value);
      setSpeed(r);
      speedDisplay.textContent = r.toFixed(2) + 'x';
    });

    // ── Build loops ──
    LOOPS.forEach(loop => {
      createLoopElement(loop.start, loop.end, loop.label);
    });

    // ── YouTube player ──
    let loopTimer = null;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: VIDEO_ID,
        playerVars: {
          origin: window.location.origin,
          rel: 0
        },
        events: {
          onReady: () => {
            playerReady = true;
            if (useLocalAudio) player.mute();
          },
          onStateChange: (event) => {
            clearInterval(loopTimer);
            if (event.data === YT.PlayerState.PLAYING) {
              if (loopActive) {
                loopTimer = setInterval(checkLoop, 100);
              }
              // Sync grain audio when video starts playing
              if (useLocalAudio && grainReady) {
                const audioTime = player.getCurrentTime() + getOffset();
                grainPlay(audioTime);
              }
            } else if (event.data === YT.PlayerState.PAUSED) {
              if (useLocalAudio) grainStop();
            } else if (event.data === YT.PlayerState.ENDED) {
              playActive = false;
              playBtn.textContent = 'play piece';
              if (useLocalAudio) grainStop();
            }
          }
        }
      });
    };

    if (window.YT && window.YT.Player) {
      window.onYouTubeIframeAPIReady();
    }
  </script>
</body>
</html>
